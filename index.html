
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Plant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Plant</h1>

<div class="plant-container">
  <img class="plant-pic" id="plant-image" src="happy.png" alt="My Plant">
  <div id="messageBox" class="textbox">Heyyyy I'm your new plant! Nice to meet you!!</div>
</div>

<div class="status-box">
    <div class="status-line" id="thirst">Thirst Level: </div>
    <div class="status-line">
    Last Moisture Value: <span id="moistureValue"></span> 
        (Last updated: <span id="lastUpdated">)</span>
    </div>
    <div class="status-line">
    Last Watered: <span id="lastWatered"></span>
    </div>

</div>

<div class="button-row">
  <button id="moisture-btn">Get Current Moisture</button>
  <div class="water-dropdown-container">
    <button id="water-btn">Water Me ⬇</button>
    <div class="dropdown" id="water-options">
      <button class="dropdown-option">Short Water</button>
      <button class="dropdown-option">Medium Water</button>
      <button class="dropdown-option">Long Water</button>
    </div>
  </div>
</div>

<div id="rain-container"></div>
<p><a href="demo.html" id="watch-demo-btn">Watch the Demo Video</a></p>


<script type="module" src="main.js"></script>


</body>
</html>
